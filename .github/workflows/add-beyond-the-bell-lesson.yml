name: Add Beyond the Bell lesson

on:
  push:
    branches:
      - test
    paths:
      - .github/workflows/add-beyond-the-bell-lesson.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out test branch
        uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0

      - name: Assemble and verify lesson
        shell: bash
        run: |
          set -euo pipefail
          output="lessons/statistics/beyond-the-bell-the-normal-distribution-and-its-relatives.html"
          mkdir -p "$(dirname "$output")"
          cat .lesson-build/beyond-the-bell/part-*.txt | base64 --decode | gzip --decompress > "$output"
          echo "92a0a7984df57f8fd16f1a32497829391ee996d5fa146d72760243eecfd9de71  $output" | sha256sum --check --strict
          test "$(wc -c < "$output")" -eq 133144

      - name: Register lesson in the library
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('chi-square-lesson-library.js')
          text = path.read_text(encoding='utf-8')
          marker = "data-beyond-the-bell"
          if marker not in text:
              lesson = """,
    {
      marker: 'data-beyond-the-bell',
      path: '/lessons/statistics/beyond-the-bell-the-normal-distribution-and-its-relatives',
      topic: 'statistics',
      level: 'intermediate',
      interactive: 'true',
      search: 'beyond the bell normal related distributions central limit theorem clt weibull lognormal student t binomial poisson exponential chi square standard error sampling distribution reliability density pdf cdf intermediate interactive simulator',
      meta: '<span>Intermediate</span><span>Interactive</span><span>20 min</span>',
      title: 'Beyond the Bell: The Normal Distribution and Its Relatives',
      description: 'See how the normal connects to the Weibull, lognormal, t, binomial and more — with a live Central Limit Theorem simulator.'
    }"""
              closing = "\n  ];"
              if closing not in text:
                  raise SystemExit('Could not locate the LESSONS array closing marker.')
              text = text.replace(closing, lesson + closing, 1)
              path.write_text(text, encoding='utf-8')

          checks = {
              'marker': marker in text,
              'clean path': '/lessons/statistics/beyond-the-bell-the-normal-distribution-and-its-relatives' in text,
              'intermediate filter': "level: 'intermediate'" in text,
              'interactive filter': "interactive: 'true'" in text,
              'library description': 'live Central Limit Theorem simulator' in text,
          }
          failed = [name for name, passed in checks.items() if not passed]
          if failed:
              raise SystemExit('Library validation failed: ' + ', '.join(failed))
          PY

      - name: Remove temporary staging files
        shell: bash
        run: |
          rm -rf .lesson-build/beyond-the-bell
          rm -f .github/workflows/add-beyond-the-bell-lesson.yml

      - name: Commit lesson and library registration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add interactive Beyond the Bell statistics lesson"
          git push origin HEAD:test
