name: Add Chi-Square lesson to library

on:
  push:
    paths:
      - '.github/workflows/add-chi-square-lesson.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add lesson to Statistics section
        run: |
          python - <<'PY'
          from pathlib import Path

          lessons_path = Path('lessons.html')
          lessons = lessons_path.read_text(encoding='utf-8')

          if 'chi-square-goodness-of-fit-test' not in lessons:
              row = '''            <a class="lesson-row" href="lessons/statistics/chi-square-goodness-of-fit-test.html" data-lesson-item data-topic="statistics" data-level="intermediate" data-interactive="true" data-search="chi square goodness of fit test observed expected counts probabilities degrees of freedom p value calculator distribution graph quiz statistics">
              <div>
                <div class="lesson-meta"><span>Intermediate</span><span>Interactive</span></div>
                <h3>Chi-Square Goodness-of-Fit Test</h3>
                <p>Test whether observed category counts fit an expected distribution using a live calculator, graph, worked example, and quiz.</p>
              </div>
              <span class="lesson-action">Start lesson</span>
            </a>
'''
              marker = '            <a class="lesson-row" href="lessons/anova-plain-english.html"'
              if marker not in lessons:
                  raise SystemExit('Statistics insertion marker was not found.')
              lessons = lessons.replace(marker, row + marker, 1)

              stats_start = lessons.index('<section class="lesson-category" id="statistics"')
              stats_end = lessons.index('</section>', stats_start)
              stats = lessons[stats_start:stats_end]
              stats = stats.replace('<span class="category-count">4 lessons</span>', '<span class="category-count">5 lessons</span>', 1)
              lessons = lessons[:stats_start] + stats + lessons[stats_end:]
              lessons = lessons.replace('<span id="results-count" aria-live="polite">14 lessons</span>', '<span id="results-count" aria-live="polite">15 lessons</span>', 1)
              lessons_path.write_text(lessons, encoding='utf-8')

          contrast_path = Path('contrast-fix.js')
          contrast = contrast_path.read_text(encoding='utf-8')
          old = "if (categoryCount) categoryCount.textContent = '4 lessons';"
          new = "if (categoryCount) {\n      const count = section.querySelectorAll('[data-lesson-item]').length;\n      categoryCount.textContent = count + (count === 1 ? ' lesson' : ' lessons');\n    }"
          if old in contrast:
              contrast = contrast.replace(old, new, 1)
              contrast_path.write_text(contrast, encoding='utf-8')
          elif 'const count = section.querySelectorAll' not in contrast:
              raise SystemExit('DMAIC lesson-count update marker was not found.')
          PY

      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/add-chi-square-lesson.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons.html contrast-fix.js .github/workflows/add-chi-square-lesson.yml
          git commit -m "Add Chi-Square Goodness-of-Fit lesson to Statistics [skip ci]"
          git push
