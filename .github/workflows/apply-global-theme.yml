name: Apply shared site controllers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**/*.html'
      - theme.js
      - site-sections.js
      - .github/workflows/apply-global-theme.yml

permissions:
  contents: write

jobs:
  update-html-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add shared controllers to every HTML page
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          repo = Path('.')
          script_tags = [
              '<script src="/theme.js"></script>',
              '<script src="/site-sections.js"></script>',
          ]
          changed = []

          inline_theme_pattern = re.compile(
              r'\s*<script>\s*\(function\s*\(\)\s*\{.*?upskill-theme.*?</script>',
              flags=re.DOTALL,
          )

          for path in sorted(repo.rglob('*.html')):
              if '.git' in path.parts:
                  continue

              text = path.read_text(encoding='utf-8')
              original = text

              # Remove the older homepage-only inline theme scripts so the
              # shared controller remains the single source of truth.
              text = inline_theme_pattern.sub('', text)

              if '</head>' not in text:
                  print(f'Skipping {path}: no closing head tag')
                  continue

              missing_tags = [tag for tag in script_tags if tag not in text]
              if missing_tags:
                  insertion = ''.join(f'  {tag}\n' for tag in missing_tags)
                  text = text.replace('</head>', insertion + '</head>', 1)

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          print(f'Updated {len(changed)} HTML files')
          for item in changed:
              print(f'  - {item}')
          PY

      - name: Commit generated HTML updates
        shell: bash
        run: |
          if git diff --quiet; then
            echo "All HTML pages already use the shared site controllers."
            exit 0
          fi

          git config user.name "UpSkill Sprint Site Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -- '*.html'
          git commit -m "Load shared theme and site navigation on every page"
          git push
