name: Export lessons snapshot

on:
  pull_request:
    paths:
      - '.github/workflows/export-lessons-snapshot.yml'
  push:
    branches: [test]
    paths:
      - '.github/workflows/export-lessons-snapshot.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload lessons snapshot
        uses: actions/upload-artifact@v4
        with:
          name: lessons-snapshot
          path: lessons.html
          retention-days: 1
