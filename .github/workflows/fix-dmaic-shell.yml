name: Fix DMAIC lesson shell

on:
  push:
    paths:
      - '.github/workflows/fix-dmaic-shell.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repair generated-page injection
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lessons/lean-six-sigma/dmaic-formula-encyclopedia.html')
          text = path.read_text(encoding='utf-8')

          old = '''          siteHeaderStyles() +
          '<script src="/theme.js"><\\\\/script>' +
          '<script src="/arrow-cleanup.js"><\\\\/script>' +
          '<script src="/contrast-fix.js"><\\\\/script>' +
          '</head>'
'''
          new = '''          siteHeaderStyles() +
          '</head>'
'''

          if old not in text:
              raise SystemExit('Expected injection block was not found.')

          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/fix-dmaic-shell.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons/lean-six-sigma/dmaic-formula-encyclopedia.html .github/workflows/fix-dmaic-shell.yml
          git commit -m "Repair DMAIC encyclopedia site header shell [skip ci]"
          git push
