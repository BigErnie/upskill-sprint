name: Fix protected email HTML

on:
  push:
    branches:
      - test
    paths:
      - '.github/workflows/fix-protected-email-html.yml'

permissions:
  contents: write

jobs:
  fix-email-markup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out test branch
        uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0

      - name: Replace Cloudflare email markup directly in HTML
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          EMAIL = "skillsprintconsulting@gmail.com"
          MAILTO = f"mailto:{EMAIL}"

          protected_anchor = re.compile(
              r'<a(?P<pre>[^>]*?)\bhref=(?P<q>["\'])/cdn-cgi/l/email-protection[^"\']*(?P=q)(?P<post>[^>]*)>\s*'
              r'<span\b[^>]*\bclass=(?P<sq>["\'])[^"\']*(?:__cf_email__|cf_email)[^"\']*(?P=sq)[^>]*>.*?</span>\s*</a>',
              re.IGNORECASE | re.DOTALL,
          )
          generic_protected_anchor = re.compile(
              r'<a(?P<pre>[^>]*?)\bhref=(?P<q>["\'])/cdn-cgi/l/email-protection[^"\']*(?P=q)(?P<post>[^>]*)>.*?</a>',
              re.IGNORECASE | re.DOTALL,
          )
          standalone_cf_span = re.compile(
              r'<span\b[^>]*\bclass=(?P<q>["\'])[^"\']*(?:__cf_email__|cf_email)[^"\']*(?P=q)[^>]*>.*?</span>',
              re.IGNORECASE | re.DOTALL,
          )
          cdn_script = re.compile(
              r'<script\b[^>]*\bsrc=(?P<q>["\'])[^"\']*cdn-cgi[^"\']*(?P=q)[^>]*>\s*</script>',
              re.IGNORECASE | re.DOTALL,
          )

          changed = []
          for path in sorted(Path('.').rglob('*.html')):
              if '.git' in path.parts:
                  continue
              original = path.read_text(encoding='utf-8')
              text = protected_anchor.sub(
                  lambda m: f'<a{m.group("pre")}href="{MAILTO}"{m.group("post")}>{EMAIL}</a>',
                  original,
              )
              text = generic_protected_anchor.sub(
                  lambda m: f'<a{m.group("pre")}href="{MAILTO}"{m.group("post")}>{EMAIL}</a>',
                  text,
              )
              text = standalone_cf_span.sub(f'<a href="{MAILTO}">{EMAIL}</a>', text)
              text = cdn_script.sub('', text)

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          decoder = Path('cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js')
          if decoder.exists():
              decoder.unlink()
              changed.append(str(decoder))

          remaining = []
          for path in sorted(Path('.').rglob('*.html')):
              if '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8')
              if re.search(r'cdn-cgi|cf_email', text, re.IGNORECASE):
                  remaining.append(str(path))

          if remaining:
              print('Protected email markup remains in:', file=sys.stderr)
              print('\n'.join(remaining), file=sys.stderr)
              sys.exit(1)

          print('Changed files:')
          print('\n'.join(changed) if changed else '(none)')
          PY

      - name: Commit fixes to test
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Fix protected email markup directly in HTML"
          git push origin HEAD:test
