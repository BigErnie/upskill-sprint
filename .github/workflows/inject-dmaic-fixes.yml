name: Inject DMAIC encyclopedia refinements

on:
  push:
    paths:
      - '.github/workflows/inject-dmaic-fixes.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject generated-page refinement script
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('lessons/lean-six-sigma/dmaic-formula-encyclopedia.html')
          text = path.read_text(encoding='utf-8')

          old = """        .replace(
          '<body>',
          '<body>' + siteHeaderMarkup()
        );
"""
          new = """        .replace(
          '<body>',
          '<body>' + siteHeaderMarkup()
        )
        .replace(
          '</body>',
          '<script src=\"/dmaic-encyclopedia-fixes.js\">' + '<' + '/script></body>'
        );
"""

          if old not in text:
              raise SystemExit('Expected DMAIC body injection block was not found.')

          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Remove workflow and commit
        run: |
          rm .github/workflows/inject-dmaic-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lessons/lean-six-sigma/dmaic-formula-encyclopedia.html .github/workflows/inject-dmaic-fixes.yml
          git commit -m "Apply DMAIC encyclopedia content refinements [skip ci]"
          git push
