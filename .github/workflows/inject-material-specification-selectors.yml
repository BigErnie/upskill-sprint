name: Inject material specification selectors

on:
  push:
    paths:
      - '.github/workflows/inject-material-specification-selectors.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load standardized specification selectors in the checker
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tools/material-specification-compliance-checker.html')
          text = path.read_text(encoding='utf-8')

          old = "document.open();document.write(html.replace('</body>', '<script src=\"/contrast-fix.js\"><\\/script></body>'));document.close();"
          new = "document.open();document.write(html.replace('</body>', '<script src=\"/material-specification-dropdowns.js\"><\\/script><script src=\"/contrast-fix.js\"><\\/script></body>'));document.close();"

          if '/material-specification-dropdowns.js' in text:
              print('Selector script is already injected.')
          elif old not in text:
              raise SystemExit('Expected checker document-write statement was not found.')
          else:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Remove one-time workflow and commit
        run: |
          rm .github/workflows/inject-material-specification-selectors.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/material-specification-compliance-checker.html .github/workflows/inject-material-specification-selectors.yml
          git commit -m "Load standardized specification selectors in material checker [skip ci]"
          git push
