name: Polish Pareto lesson ending

on:
  push:
    branches:
      - test

permissions:
  contents: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: test
          fetch-depth: 0

      - name: Apply focused visual cleanup
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          lesson_path = Path('lessons/understanding-pareto-chart.html')
          workflow_path = Path('.github/workflows/polish-pareto-bottom.yml')
          lesson = lesson_path.read_text(encoding='utf-8')

          marker = '    @media print {'
          cleanup_marker = '    /* Bottom-of-lesson visual cleanup */'
          if cleanup_marker not in lesson:
              css = r'''    /* Bottom-of-lesson visual cleanup */
    .lesson-wrapper #summary {
      max-width: 920px;
      margin: 3rem auto 1.8rem;
    }
    .lesson-wrapper #references {
      max-width: 920px;
      margin: 1.8rem auto 0;
    }
    .summary-grid {
      display: block;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .summary-item {
      display: grid;
      grid-template-columns: minmax(9.5rem, 0.42fr) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
      padding: 0.9rem 0;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }
    .summary-item:last-child { border-bottom: 0; }
    .summary-item strong {
      margin: 0;
      color: var(--teal-dark);
      font-family: "Work Sans", Arial, sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.01em;
    }
    .references-list {
      columns: 2;
      column-gap: 2.5rem;
      margin: 0;
      padding-left: 1.35rem;
    }
    .references-list li {
      break-inside: avoid;
      margin: 0 0 0.65rem;
      padding-left: 0.15rem;
    }
    .references-list a {
      text-decoration: none;
      text-underline-offset: 0.18em;
    }
    .references-list a:hover,
    .references-list a:focus-visible { text-decoration: underline; }

    .lesson-wrapper #lesson-progress-widget {
      max-width: 920px;
      margin: 1.75rem auto 0;
      padding: 0;
    }
    .lesson-wrapper #lesson-progress-widget .lp-card {
      display: grid;
      grid-template-columns: minmax(9.5rem, 0.42fr) minmax(0, 1fr) auto;
      gap: 0.35rem 1rem;
      align-items: center;
      padding: 1.15rem 0;
      border: 0;
      border-top: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }
    .lesson-wrapper #lesson-progress-widget .lp-label {
      grid-column: 1;
      grid-row: 1 / span 2;
      margin: 0;
    }
    .lesson-wrapper #lesson-progress-widget .lp-card > p:not(.lp-label) {
      grid-column: 2;
      margin: 0;
    }
    .lesson-wrapper #lesson-progress-widget .lp-actions {
      grid-column: 3;
      grid-row: 1 / span 2;
      margin: 0;
    }

    .lesson-footer {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.25rem 0 0;
      border: 0;
      border-top: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
    }
    .lesson-footer-nav {
      grid-template-columns: minmax(0, 0.75fr) minmax(18rem, 1.25fr);
      gap: 2rem;
      align-items: center;
    }
    .back-category-link {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
    }
    .lesson-footer-next {
      max-width: 36rem;
      justify-self: end;
      color: var(--muted);
      line-height: 1.55;
    }
    .lesson-footer-next strong { color: var(--ink); }

    @media (max-width: 700px) {
      .summary-item { grid-template-columns: 1fr; gap: 0.25rem; }
      .references-list { columns: 1; }
      .lesson-wrapper #lesson-progress-widget .lp-card {
        grid-template-columns: 1fr;
        gap: 0.45rem;
        align-items: start;
      }
      .lesson-wrapper #lesson-progress-widget .lp-label,
      .lesson-wrapper #lesson-progress-widget .lp-card > p:not(.lp-label),
      .lesson-wrapper #lesson-progress-widget .lp-actions {
        grid-column: 1;
        grid-row: auto;
      }
      .lesson-wrapper #lesson-progress-widget .lp-actions { margin-top: 0.35rem; }
      .lesson-footer-nav { grid-template-columns: 1fr; gap: 0.75rem; }
      .lesson-footer-next { justify-self: start; text-align: left; }
    }

'''
              if marker not in lesson:
                  raise SystemExit('Print media marker not found')
              lesson = lesson.replace(marker, css + marker, 1)
              lesson_path.write_text(lesson, encoding='utf-8')

          assert cleanup_marker in lesson_path.read_text(encoding='utf-8')
          workflow_path.unlink()
          PY

      - name: Commit polished layout
        shell: bash
        run: |
          git config user.name "upskillsprint-agent"
          git config user.email "upskillsprint-agent@users.noreply.github.com"
          git add lessons/understanding-pareto-chart.html .github/workflows/polish-pareto-bottom.yml
          git commit -m "Polish Pareto lesson summary and footer layout"
          git push origin HEAD:test

# Triggered after workflow registration.
